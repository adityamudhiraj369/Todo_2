<!DOCTYPE html>
<html>
<head>
<title>Goals & Todo List</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{ box-sizing:border-box; margin:0; padding:0;}
body{ font-family:'Segoe UI',sans-serif; background:linear-gradient(135deg,#667eea,#764ba2); display:flex; justify-content:center; align-items:center; min-height:100vh; padding:20px;}
.container{ width:100%; max-width:520px;}
.section{ margin-bottom:30px; padding:20px; border-radius:12px; color:white; background-size:cover; background-position:center; position:relative; overflow:hidden; box-shadow:0 6px 15px rgba(0,0,0,0.2);}
.section::before{ content:""; position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.45); z-index:0;}
.section *{ position:relative; z-index:1;}
.section:nth-child(1){ background-image:url("https://images.unsplash.com/photo-1484480974693-6ca0a78fb36b"); }
.section:nth-child(2){ background-image:url("https://images.unsplash.com/photo-1500530855697-b586d89ba3ee"); }
.section:nth-child(3){ background-image:url("https://images.unsplash.com/photo-1500534314209-a25ddb2bd429"); }
h2{ text-align:center; margin-bottom:5px; color:white; }
.quote{ text-align:center; font-size:13px; color:#ddd; font-style:italic; margin-bottom:15px; }
.inputBox{ display:flex; gap:10px; }
input{ flex:1; padding:10px; border-radius:8px; border:none; font-size:14px; outline:none;}
button{ padding:10px 16px; border:none; border-radius:8px; background:#667eea; color:white; font-weight:600; cursor:pointer; transition:0.3s;}
button:hover{ background:#5563d1; transform:scale(1.05);}
ul{ list-style:none; margin-top:15px; }
li{ padding:12px; margin-top:10px; background:white; border-radius:8px; display:flex; justify-content:space-between; align-items:center; box-shadow:0 2px 6px rgba(0,0,0,0.2); transition:0.2s; color:black;}
li:hover{ transform:scale(1.02);}
.task-left{ display:flex; align-items:center; gap:10px;}
.number{ font-weight:bold; color:#667eea;}
.completed{ background:#d4edda; text-decoration:line-through; color:#555;}
.actions{ display:flex; gap:8px; align-items:center;}
.completeBtn{ background:#28a745; padding:6px 10px; border-radius:6px; font-size:12px;}
.completeBtn:hover{ background:#1f8c3a;}
.deleteCross{ cursor:pointer; font-size:16px; transition:0.2s;}
.deleteCross:hover{ transform:scale(1.3);}
.prevBtn{ margin-top:10px; display:block; width:100%; padding:8px; border:none; border-radius:6px; background:#333; color:white; cursor:pointer; font-size:14px;}
.prevBtn:hover{ background:#111;}
</style>
</head>

<body>

<div class="container">

<!-- Todo List -->
<div class="section">
<h2>Manu's Progess Path</h2>
<div class="quote">"Small progress every day leads to big success."</div>
<div class="inputBox">
<input type="text" id="todoInput" placeholder="Enter task">
<button onclick="addTask('todoInput','todoList')">Add</button>
</div>
<button class="prevBtn" onclick="loadPrevious('todoList')">Load Yesterday's Tasks</button>
<ul id="todoList"></ul>
</div>

<!-- Short Goals -->
<div class="section">
<h2>Short Term Goals</h2>
<div class="quote">"Focus on today's effort, tomorrow will reward you."</div>
<div class="inputBox">
<input type="text" id="shortInput" placeholder="Enter goal">
<button onclick="addTask('shortInput','shortList')">Add</button>
</div>
<ul id="shortList"></ul>
</div>

<!-- Long Goals -->
<div class="section">
<h2>Long Term Goals</h2>
<div class="quote">"Great achievements are built from consistent actions."</div>
<div class="inputBox">
<input type="text" id="longInput" placeholder="Enter goal">
<button onclick="addTask('longInput','longList')">Add</button>
</div>
<ul id="longList"></ul>
</div>

</div>

<script>
// Helper to get today's date in YYYY-MM-DD
function todayDate(){ 
  return new Date().toISOString().slice(0,10); 
}

// Helper to get yesterday's date
function yesterdayDate(){ 
  let d = new Date(); 
  d.setDate(d.getDate()-1); 
  return d.toISOString().slice(0,10); 
}

// Save tasks with date
function saveTasks(listId){
  let tasks=[];
  document.querySelectorAll("#"+listId+" li").forEach(li=>{
    tasks.push({
      text: li.querySelector("span:nth-child(2)").innerText,
      completed: li.classList.contains("completed")
    });
  });
  localStorage.setItem(listId+'-'+todayDate(), JSON.stringify(tasks));
}

// Load tasks for today
function loadTasks(listId){
  let tasks=JSON.parse(localStorage.getItem(listId+'-'+todayDate())||"[]");
  tasks.forEach(task=> addTaskFromStorage(task.text, task.completed, listId));
}

// Load tasks for previous day
function loadPrevious(listId){
  let tasks=JSON.parse(localStorage.getItem(listId+'-'+yesterdayDate())||"[]");
  if(tasks.length===0){ alert("No data for yesterday!"); return; }
  document.getElementById(listId).innerHTML=""; // clear today
  tasks.forEach(task=> addTaskFromStorage(task.text, task.completed, listId));
}

// Update numbering & save
function updateNumbers(listId){
  let tasks=document.querySelectorAll("#"+listId+" li");
  tasks.forEach((task,index)=> task.querySelector(".number").innerText=index+1);
  saveTasks(listId);
}

// Create li element
function addTaskFromStorage(text, completed, listId){
  let li=document.createElement("li");
  let left=document.createElement("div"); left.className="task-left";
  let number=document.createElement("span"); number.className="number";
  let taskText=document.createElement("span"); taskText.innerText=text;

  taskText.onclick=function(){ li.classList.toggle("completed"); saveTasks(listId); }

  left.appendChild(number); left.appendChild(taskText);

  let actions=document.createElement("div"); actions.className="actions";
  let completeBtn=document.createElement("button"); completeBtn.innerText="Completed"; completeBtn.className="completeBtn";
  completeBtn.onclick=function(){ li.classList.add("completed"); saveTasks(listId); }

  let deleteCross=document.createElement("span"); deleteCross.innerHTML="❌"; deleteCross.className="deleteCross";
  deleteCross.onclick=function(){ li.remove(); updateNumbers(listId); }

  actions.appendChild(completeBtn); actions.appendChild(deleteCross);
  li.appendChild(left); li.appendChild(actions);
  if(completed) li.classList.add("completed");

  document.getElementById(listId).appendChild(li);
  updateNumbers(listId);
}

// Add new task from input
function addTask(inputId,listId){
  let input=document.getElementById(inputId);
  if(input.value===""){ alert("Enter something"); return; }
  addTaskFromStorage(input.value,false,listId);
  input.value="";
}

// Load today's tasks on page load
window.onload=function(){ ["todoList","shortList","longList"].forEach(loadTasks); }

</script>

</body>

</html>
